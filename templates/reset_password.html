<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nueva contrasena - NEME BET</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="theme-color" content="#0F6E56">
</head>
<body>
<div class="container">
    <div class="header">
        <img src="/static/logo.svg" alt="NEME BET" class="logo">
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}{% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="/reset-password/{{ reset_token }}">
        <div class="card">
            <h2>Crear nueva contrasena</h2>
            <label>Nueva contrasena</label>
            <input type="password" name="password" placeholder="Minimo 6 caracteres" required minlength="6" style="margin-bottom:10px">
            <label>Confirmar contrasena</label>
            <input type="password" name="password2" placeholder="Repite la contrasena" required minlength="6">
        </div>
        <button type="submit" class="btn">Guardar contrasena</button>
    </form>

    <div class="footer">NEME BET v5.0</div>
</div>
</body>
</html>
