<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Post metallic gradient -->
    <linearGradient id="poste" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="30%" stop-color="#eee"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="70%" stop-color="#eee"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <linearGradient id="posteV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#777"/>
      <stop offset="35%" stop-color="#ddd"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="65%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2A1A"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFF4A0"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <!-- Green halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F6E56" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#0F6E56" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0F6E56" stop-opacity="0"/>
    </radialGradient>
    <!-- Background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#0D3D2B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Ground grass gradient -->
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F6E56" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#050505"/>
  <ellipse cx="200" cy="160" rx="180" ry="120" fill="url(#bgGlow)"/>

  <!-- Ground / grass glow -->
  <ellipse cx="200" cy="260" rx="200" ry="30" fill="url(#grass)"/>
  <line x1="40" y1="258" x2="360" y2="258" stroke="#0F6E56" stroke-width="1" opacity="0.3"/>

  <!-- NET in perspective (converging lines) -->
  <g stroke="#1a3a2a" stroke-width="0.6" opacity="0.3">
    <!-- Vertical net lines converging to vanishing point (200, 40) -->
    <line x1="58" y1="50" x2="78" y2="255"/>
    <line x1="93" y1="46" x2="108" y2="255"/>
    <line x1="129" y1="43" x2="138" y2="255"/>
    <line x1="164" y1="41" x2="168" y2="255"/>
    <line x1="200" y1="40" x2="200" y2="255"/>
    <line x1="236" y1="41" x2="232" y2="255"/>
    <line x1="271" y1="43" x2="262" y2="255"/>
    <line x1="307" y1="46" x2="292" y2="255"/>
    <line x1="342" y1="50" x2="322" y2="255"/>
    <!-- Horizontal net lines (curved for depth) -->
    <path d="M58,80 Q200,65 342,80" fill="none"/>
    <path d="M65,115 Q200,95 335,115" fill="none"/>
    <path d="M70,150 Q200,130 330,150" fill="none"/>
    <path d="M72,185 Q200,168 328,185" fill="none"/>
    <path d="M75,218 Q200,205 325,218" fill="none"/>
  </g>

  <!-- GOAL FRAME (thicker posts) -->
  <!-- Left post -->
  <rect x="40" y="46" width="10" height="214" rx="3" fill="url(#posteV)"/>
  <rect x="40" y="46" width="4" height="214" rx="1" fill="rgba(255,255,255,0.15)"/>
  <!-- Right post -->
  <rect x="350" y="46" width="10" height="214" rx="3" fill="url(#posteV)"/>
  <rect x="356" y="46" width="4" height="214" rx="1" fill="rgba(0,0,0,0.2)"/>
  <!-- Crossbar -->
  <rect x="40" y="42" width="320" height="10" rx="3" fill="url(#poste)"/>
  <rect x="40" y="42" width="320" height="4" rx="1" fill="rgba(255,255,255,0.2)"/>
  <!-- Post shadows on ground -->
  <rect x="46" y="256" width="4" height="6" rx="2" fill="#0F6E56" opacity="0.3"/>
  <rect x="352" y="256" width="4" height="6" rx="2" fill="#0F6E56" opacity="0.3"/>

  <!-- LIGHT RAYS from center -->
  <g opacity="0.08">
    <polygon points="200,130 140,20 160,20" fill="white"/>
    <polygon points="200,130 240,20 260,20" fill="white"/>
    <polygon points="200,130 50,60 60,45" fill="white"/>
    <polygon points="200,130 340,45 350,60" fill="white"/>
    <polygon points="200,130 30,140 30,120" fill="white"/>
    <polygon points="200,130 370,120 370,140" fill="white"/>
  </g>

  <!-- GREEN HALO behind shield -->
  <ellipse cx="200" cy="155" rx="80" ry="75" fill="url(#halo)" filter="glowStrong"/>

  <!-- SHIELD shape (30% larger) -->
  <g filter="glow">
    <!-- Shield gold border -->
    <path d="M132,78 L268,78 L268,192 Q268,240 200,258 Q132,240 132,192 Z"
          fill="url(#gold)" stroke="#FFD700" stroke-width="1.5"/>
    <!-- Shield inner -->
    <path d="M138,84 L262,84 L262,189 Q262,234 200,251 Q138,234 138,189 Z"
          fill="url(#shield)"/>
    <!-- Shield shine highlight -->
    <path d="M138,84 L262,84 L262,112 Q200,105 138,112 Z"
          fill="white" opacity="0.08"/>
  </g>

  <!-- Text NEME (bigger) -->
  <text x="200" y="165" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Impact,sans-serif"
        font-size="54" font-weight="900" letter-spacing="3"
        fill="white" filter="glow">NEME</text>
  <!-- Text BET (bigger) -->
  <text x="200" y="212" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Impact,sans-serif"
        font-size="44" font-weight="900" letter-spacing="7"
        fill="#FFD700" filter="glow">BET</text>

  <!-- SPARKLES / STARS -->
  <g fill="#FFD700" opacity="0.7">
    <!-- Star top -->
    <polygon points="200,78 202,84 208,84 203,88 205,94 200,90 195,94 197,88 192,84 198,84" transform="scale(0.6) translate(133,30)"/>
    <!-- Sparkle left -->
    <circle cx="130" cy="110" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="125" cy="190" r="1" fill="#FFD700" opacity="0.5"/>
    <!-- Sparkle right -->
    <circle cx="270" cy="105" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="275" cy="185" r="1" fill="#FFD700" opacity="0.5"/>
    <!-- Floating particles -->
    <circle cx="160" cy="80" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="240" cy="75" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="110" cy="140" r="0.7" fill="#1AE89B" opacity="0.3"/>
    <circle cx="290" cy="135" r="0.7" fill="#1AE89B" opacity="0.3"/>
    <circle cx="175" cy="235" r="0.6" fill="white" opacity="0.2"/>
    <circle cx="225" cy="240" r="0.6" fill="white" opacity="0.2"/>
  </g>

  <!-- Speed lines on sides -->
  <g stroke="white" stroke-width="0.5" opacity="0.1">
    <line x1="20" y1="120" x2="55" y2="125"/>
    <line x1="15" y1="140" x2="50" y2="142"/>
    <line x1="18" y1="160" x2="48" y2="160"/>
    <line x1="345" y1="125" x2="380" y2="120"/>
    <line x1="350" y1="142" x2="385" y2="140"/>
    <line x1="352" y1="160" x2="382" y2="160"/>
  </g>

  <!-- Top corner lens flare -->
  <circle cx="252" cy="95" r="6" fill="white" opacity="0.15" filter="glowSoft"/>
  <circle cx="252" cy="95" r="2" fill="white" opacity="0.4"/>
</svg>
