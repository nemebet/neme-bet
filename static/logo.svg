<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Net background -->
  <g stroke="#1a3a2a" stroke-width="0.5" opacity="0.4">
    <!-- Vertical net lines -->
    <line x1="40" y1="12" x2="40" y2="108"/>
    <line x1="65" y1="12" x2="65" y2="108"/>
    <line x1="90" y1="12" x2="90" y2="108"/>
    <line x1="115" y1="12" x2="115" y2="108"/>
    <line x1="140" y1="12" x2="140" y2="108"/>
    <line x1="165" y1="12" x2="165" y2="108"/>
    <line x1="190" y1="12" x2="190" y2="108"/>
    <line x1="215" y1="12" x2="215" y2="108"/>
    <line x1="240" y1="12" x2="240" y2="108"/>
    <line x1="265" y1="12" x2="265" y2="108"/>
    <!-- Horizontal net lines -->
    <line x1="20" y1="30" x2="280" y2="30"/>
    <line x1="20" y1="50" x2="280" y2="50"/>
    <line x1="20" y1="70" x2="280" y2="70"/>
    <line x1="20" y1="90" x2="280" y2="90"/>
  </g>

  <!-- Goal frame -->
  <!-- Left post -->
  <rect x="16" y="8" width="5" height="104" rx="2" fill="white"/>
  <!-- Right post -->
  <rect x="279" y="8" width="5" height="104" rx="2" fill="white"/>
  <!-- Crossbar -->
  <rect x="16" y="8" width="268" height="5" rx="2" fill="white"/>
  <!-- Corner details -->
  <rect x="16" y="8" width="8" height="8" rx="1" fill="white" opacity="0.5"/>
  <rect x="276" y="8" width="8" height="8" rx="1" fill="white" opacity="0.5"/>

  <!-- Text NEMEBET -->
  <text x="150" y="78" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="52" font-weight="900" letter-spacing="-1"
        fill="#0F6E56" filter="glow" opacity="0.4">NEMEBET</text>
  <text x="150" y="78" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="52" font-weight="900" letter-spacing="-1"
        fill="white">NEMEBET</text>
</svg>
