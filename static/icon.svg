<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2A1A"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFF4A0"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D3D2B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="#050505"/>
  <circle cx="256" cy="256" r="200" fill="url(#bg)"/>

  <!-- Shield gold border -->
  <path d="M156,110 L356,110 L356,320 Q356,420 256,450 Q156,420 156,320 Z"
        fill="url(#gd)" stroke="#FFD700" stroke-width="2" filter="gl"/>
  <!-- Shield inner -->
  <path d="M164,118 L348,118 L348,316 Q348,410 256,438 Q164,410 164,316 Z"
        fill="url(#sh)"/>
  <!-- Shield top highlight -->
  <path d="M164,118 L348,118 L348,165 Q256,150 164,165 Z"
        fill="white" opacity="0.07"/>

  <!-- Text N B -->
  <text x="256" y="290" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Impact,sans-serif"
        font-size="170" font-weight="900" letter-spacing="-5"
        fill="white" filter="gl">NB</text>

  <!-- Gold line separator -->
  <line x1="195" y1="310" x2="317" y2="310" stroke="url(#gd)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Sparkles -->
  <circle cx="340" cy="125" r="8" fill="white" opacity="0.12" filter="gl"/>
  <circle cx="340" cy="125" r="3" fill="white" opacity="0.4"/>
  <circle cx="180" cy="380" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="330" cy="370" r="3" fill="#FFD700" opacity="0.25"/>
</svg>
