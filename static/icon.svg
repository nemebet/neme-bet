<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D5C47"/>
      <stop offset="100%" style="stop-color:#0A3F31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1AE89B"/>
      <stop offset="100%" style="stop-color:#0F9B6A"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0F9B6A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1AE89B"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0F9B6A;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1AE89B;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1AE89B" stroke-width="1.5" stroke-opacity="0.15"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#1AE89B" stroke-width="0.8" stroke-opacity="0.08"/>

  <!-- Stats bars (bottom-left background) -->
  <g transform="translate(62, 180)" filter="shadow">
    <!-- Bar 1 - shortest -->
    <rect x="0" y="120" width="28" height="80" rx="6" fill="url(#bar2)" opacity="0.5"/>
    <!-- Bar 2 - medium -->
    <rect x="38" y="80" width="28" height="120" rx="6" fill="url(#bar2)" opacity="0.6"/>
    <!-- Bar 3 - tallest -->
    <rect x="76" y="40" width="28" height="160" rx="6" fill="url(#bar1)" opacity="0.7"/>
  </g>

  <!-- Trend arrow (going up) -->
  <g filter="glow">
    <polyline points="80,340 130,300 170,320 220,250"
              fill="none" stroke="#1AE89B" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <!-- Arrow head -->
    <polygon points="220,250 208,260 214,248" fill="#1AE89B" opacity="0.5"/>
  </g>

  <!-- Main text "NB" -->
  <g filter="shadow">
    <text x="256" y="296" text-anchor="middle"
          font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
          font-size="195" font-weight="900" fill="white"
          letter-spacing="-8">NB</text>
  </g>

  <!-- Accent line under text -->
  <rect x="148" y="320" width="216" height="4" rx="2" fill="url(#accent)" opacity="0.9"/>

  <!-- Small crosshair/target symbol (top-right) -->
  <g transform="translate(380, 130)" opacity="0.6">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#1AE89B" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#1AE89B" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#1AE89B"/>
    <line x1="-30" y1="0" x2="-24" y2="0" stroke="#1AE89B" stroke-width="1.5"/>
    <line x1="24" y1="0" x2="30" y2="0" stroke="#1AE89B" stroke-width="1.5"/>
    <line x1="0" y1="-30" x2="0" y2="-24" stroke="#1AE89B" stroke-width="1.5"/>
    <line x1="0" y1="24" x2="0" y2="30" stroke="#1AE89B" stroke-width="1.5"/>
  </g>

  <!-- Small percentage badge (bottom-right) -->
  <g transform="translate(400, 380)">
    <rect x="-30" y="-16" width="60" height="32" rx="8" fill="#1AE89B" opacity="0.2"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="system-ui,sans-serif" font-size="18" font-weight="700"
          fill="#1AE89B">75%</text>
  </g>
</svg>
