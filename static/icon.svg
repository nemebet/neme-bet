<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="g2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0A0A0A"/>

  <!-- Net -->
  <g stroke="#1a3a2a" stroke-width="1" opacity="0.35">
    <line x1="100" y1="90" x2="100" y2="430"/>
    <line x1="155" y1="90" x2="155" y2="430"/>
    <line x1="210" y1="90" x2="210" y2="430"/>
    <line x1="265" y1="90" x2="265" y2="430"/>
    <line x1="320" y1="90" x2="320" y2="430"/>
    <line x1="375" y1="90" x2="375" y2="430"/>
    <line x1="430" y1="90" x2="430" y2="430"/>
    <line x1="70" y1="150" x2="442" y2="150"/>
    <line x1="70" y1="210" x2="442" y2="210"/>
    <line x1="70" y1="270" x2="442" y2="270"/>
    <line x1="70" y1="330" x2="442" y2="330"/>
    <line x1="70" y1="390" x2="442" y2="390"/>
  </g>

  <!-- Goal frame -->
  <rect x="62" y="80" width="12" height="360" rx="4" fill="white"/>
  <rect x="438" y="80" width="12" height="360" rx="4" fill="white"/>
  <rect x="62" y="80" width="388" height="12" rx="4" fill="white"/>
  <!-- Corner accents -->
  <rect x="62" y="80" width="18" height="18" rx="2" fill="white" opacity="0.5"/>
  <rect x="432" y="80" width="18" height="18" rx="2" fill="white" opacity="0.5"/>

  <!-- Text NB -->
  <text x="256" y="310" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="200" font-weight="900" letter-spacing="-8"
        fill="#0F6E56" filter="g2" opacity="0.4">NB</text>
  <text x="256" y="310" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="200" font-weight="900" letter-spacing="-8"
        fill="white">NB</text>
</svg>
