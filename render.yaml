services:
  - type: web
    name: neme-bet
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webapp:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    plan: free
    healthCheckPath: /
