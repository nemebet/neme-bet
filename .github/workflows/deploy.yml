name: Deploy NEME BET

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app starts
        run: |
          timeout 5 python -c "from webapp import app; print('App OK')" || true

      # Railway auto-deploys from GitHub — this job just validates.
      # Connect your repo at railway.app and it deploys on every push.
